name: Aktualizacja aktow prawnych

on:
  schedule:
    # Uruchamianie raz w miesiacu - 1. dnia o 03:00 UTC
    - cron: '0 3 1 * *'
  workflow_dispatch:
    # Mozliwosc recznego uruchomienia

permissions:
  contents: write
  pull-requests: write

jobs:
  update-laws:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repozytorium
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Instalacja zaleznosci
        run: pip install -r scripts/requirements.txt

      - name: Pobieranie rozporzadzen UE z EUR-Lex
        id: fetch_eurlex
        run: |
          python scripts/fetch_eurlex.py \
            --output ./output/eurlex/ \
            --language PL \
            --delay 3.0 \
            --verbose
        continue-on-error: true

      - name: Pobieranie ustaw z ISAP
        id: fetch_isap
        run: |
          python scripts/fetch_isap.py \
            --output ./output/isap/ \
            --verbose
        continue-on-error: true

      - name: Pobieranie orzeczen NSA/WSA z CBOSA
        id: fetch_cbosa
        run: |
          python scripts/fetch_cbosa.py \
            --court-type nsa \
            --output ./orzecznictwo/nsa/ \
            --delay 5.0 \
            --verbose
          python scripts/fetch_cbosa.py \
            --court-type wsa \
            --output ./orzecznictwo/wsa/ \
            --delay 5.0 \
            --verbose
        continue-on-error: true

      - name: Pobieranie orzeczen TSUE z CURIA
        id: fetch_curia
        run: |
          python scripts/fetch_curia.py \
            --output ./orzecznictwo/tsue/ \
            --delay 5.0 \
            --verbose
        continue-on-error: true

      - name: Konwersja na Markdown
        run: |
          if [ -d "./output/eurlex" ] && [ "$(ls -A ./output/eurlex/*.html 2>/dev/null)" ]; then
            python scripts/convert_to_markdown.py \
              --input ./output/eurlex/ \
              --output ./przepisy/unijne/pelne-teksty/ \
              --verbose
          fi
          if [ -d "./output/isap" ] && [ "$(ls -A ./output/isap/*.html 2>/dev/null)" ]; then
            python scripts/convert_to_markdown.py \
              --input ./output/isap/ \
              --output ./przepisy/krajowe/pelne-teksty/ \
              --verbose
          fi
        continue-on-error: true

      - name: Walidacja pobranych plikow
        id: validate
        run: |
          python scripts/validate_content.py \
            --input ./output/ \
            --input ./orzecznictwo/ \
            --verbose
        continue-on-error: true

      - name: Podsumowanie wynikow
        run: |
          echo "## Aktualizacja aktow prawnych - $(date +%Y-%m-%d)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Status pobierania" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Zrodlo | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| EUR-Lex | ${{ steps.fetch_eurlex.outcome }} |" >> $GITHUB_STEP_SUMMARY
          echo "| ISAP | ${{ steps.fetch_isap.outcome }} |" >> $GITHUB_STEP_SUMMARY
          echo "| CBOSA (NSA/WSA) | ${{ steps.fetch_cbosa.outcome }} |" >> $GITHUB_STEP_SUMMARY
          echo "| CURIA (TSUE) | ${{ steps.fetch_curia.outcome }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Statystyki plikow" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- EUR-Lex HTML: $(find ./output/eurlex -name '*.html' 2>/dev/null | wc -l) plikow" >> $GITHUB_STEP_SUMMARY
          echo "- ISAP HTML: $(find ./output/isap -name '*.html' 2>/dev/null | wc -l) plikow" >> $GITHUB_STEP_SUMMARY
          echo "- Orzecznictwo NSA: $(find ./orzecznictwo/nsa -name '*.md' 2>/dev/null | wc -l) plikow" >> $GITHUB_STEP_SUMMARY
          echo "- Orzecznictwo WSA: $(find ./orzecznictwo/wsa -name '*.md' 2>/dev/null | wc -l) plikow" >> $GITHUB_STEP_SUMMARY
          echo "- Orzecznictwo TSUE: $(find ./orzecznictwo/tsue -name '*.md' 2>/dev/null | wc -l) plikow" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Walidacja" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Status walidacji: ${{ steps.validate.outcome }}" >> $GITHUB_STEP_SUMMARY

      - name: Sprawdzenie zmian
        id: check_changes
        run: |
          git add -A
          if git diff --cached --quiet; then
            echo "changes=false" >> $GITHUB_OUTPUT
          else
            echo "changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Utworzenie Pull Request
        if: steps.check_changes.outputs.changes == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          branch: auto-update/laws-${{ github.run_id }}
          title: "chore: automatyczna aktualizacja aktow prawnych"
          body: |
            ## Automatyczna aktualizacja aktow prawnych

            Workflow pobrania zakonczony. Podsumowanie:

            - EUR-Lex: ${{ steps.fetch_eurlex.outcome }}
            - ISAP: ${{ steps.fetch_isap.outcome }}
            - CBOSA: ${{ steps.fetch_cbosa.outcome }}
            - CURIA: ${{ steps.fetch_curia.outcome }}
            - Walidacja: ${{ steps.validate.outcome }}

            Utworzono automatycznie przez GitHub Actions.
          commit-message: "chore: automatyczna aktualizacja aktow prawnych"
          delete-branch: true
